name: 🎮 FreezeHost 自动续期

on:
  schedule:
    - cron: '0 3 */6 * *' # 每7天 UTC 时间 3 点 (北京时间早上 11 点)
  workflow_dispatch:

permissions:
  contents: write   # ⭐ 必须允许 push time.txt

jobs:
  renew:
    name: 🔄 执行续期任务
    runs-on: ubuntu-latest
    timeout-minutes: 30 # 多账号耗时较长

    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      - name: 🟢 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 📦 安装依赖
        run: npm install

      - name: 🌐 安装 Playwright 浏览器
        run: npx playwright install chromium --with-deps

      - name: 🛡️ 启动 GOST 代理转发
        env:
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
        run: |
          if [ -z "$GOST_PROXY" ]; then
            echo "⚠️ 未配置 GOST_PROXY，跳过代理启动"
          else
            VERSION=$(curl -s https://api.github.com/repos/ginuerzh/gost/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
            wget -q "https://github.com/ginuerzh/gost/releases/download/v${VERSION}/gost_${VERSION}_linux_amd64.tar.gz"
            tar -xzf "gost_${VERSION}_linux_amd64.tar.gz"
            chmod +x gost
            nohup ./gost -L http://:8080 -F "$GOST_PROXY" > gost.log 2>&1 &
            sleep 5
            echo "✅ GOST 代理已启动"
          fi

      - name: 🚀 运行多账号续期脚本
        env:
          DISCORD_ACCOUNTS: ${{ secrets.DISCORD_ACCOUNTS }}
          TG_BOT:           ${{ secrets.TG_BOT }}
          GOST_PROXY:       http://127.0.0.1:8080
        run: npx playwright test tests/freeze.spec.js

      # ================= 新增 Step: time.txt =================
      - name: 🕒 Keep Actions Alive (time.txt)
        if: always()
        run: |
          echo "$(date '+%Y-%m-%d %H:%M:%S')" > time.txt
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add time.txt
          git commit -m "chore: update time.txt to keep actions alive" || echo "No changes"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
